    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #e5e5e5;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #d4d4d4;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        .theme-dark {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #404040;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #60a5fa;
            --accent-hover: #93c5fd;
            --border: #404040;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .comic-viewer {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            flex-shrink: 0;
        }

        .toolbar-left, .toolbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .title {
            font-weight: 600;
            font-size: 16px;
        }

        .page-indicator {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            min-width: 36px;
            height: 36px;
        }

        .btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-icon {
            padding: 6px;
        }

        .btn-group {
            display: flex;
            gap: 4px;
        }

        .zoom-display {
            min-width: 60px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .canvas-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: var(--bg-tertiary);
            cursor: grab;
        }

        .canvas-container:active {
            cursor: grabbing;
        }

        .canvas {
            position: absolute;
            transform-origin: 0 0;
            transition: none;
        }

        .canvas.animating {
            transition: transform 0.3s ease-out;
        }

        .svg-container {
            background: white;
            box-shadow: 0 4px 20px var(--shadow);
            border-radius: 4px;
            overflow: hidden;
        }

        .svg-container svg {
            display: block;
        }

        /* Hover effects for panels */
        .svg-container.hover-enabled svg g[data-panel] {
            transition: filter 0.2s ease, transform 0.2s ease;
            transform-origin: center;
        }

        .svg-container.hover-enabled svg g[data-panel]:hover {
            filter: brightness(1.02);
            cursor: pointer;
        }

        .navigation {
            position: fixed;
            bottom: 50%;
            transform: translateY(50%);
            z-index: 50;
        }

        .navigation.prev {
            left: 16px;
        }

        .navigation.next {
            right: 16px;
        }

        .nav-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.15s ease;
        }

        .nav-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-btn:disabled:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
            border-color: var(--border);
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 16px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .separator {
            color: var(--border);
        }

        /* Fullscreen mode */
        .comic-viewer:fullscreen {
            background: var(--bg-secondary);
        }

        .comic-viewer:fullscreen .toolbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .comic-viewer:fullscreen:hover .toolbar {
            opacity: 1;
        }

        .comic-viewer:fullscreen .status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .comic-viewer:fullscreen:hover .status-bar {
            opacity: 1;
        }

        /* Hide elements based on config */
        .hidden {
            display: none !important;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .toolbar {
                padding: 8px 12px;
            }

            .toolbar-left, .toolbar-right {
                gap: 8px;
            }

            .title {
                font-size: 14px;
            }

            .btn {
                min-width: 32px;
                height: 32px;
                padding: 4px 8px;
            }

            .nav-btn {
                width: 40px;
                height: 40px;
            }

            .navigation.prev {
                left: 8px;
            }

            .navigation.next {
                right: 8px;
            }
        }

    </style>
</head>

70.0,404.71782843052404 469.49855824363647,409.16824710965034 468.01937735804836,413.3955032128752 465.6366296493606,417.1876244676987 462.46979603717466,420.35445807988464 458.6776747823512,422.73720578857245 454.4504186791263,424.2163866741605 450.0,424.71782843052404 250.0,424.71782843052404 245.5495813208737,424.2163866741605 241.32232521764882,422.73720578857245 237.53020396282534,420.35445807988464 234.3633703506394,417.18762446769875 231.9806226419516,413.3955032128752 230.50144175636353,409.16824710965034 230.0,404.71782843052404 230.0,369.9178284305241 230.50144175636353,365.4674097513978 231.9806226419516,361.2401536481729 234.3633703506394,357.4480323933494 237.53020396282534,354.2811987811635 241.32232521764882,351.89845107247567 245.5495813208737,350.4192701868876 250.0,349.9178284305241 450.0,349.9178284305241\" stroke=\"#000000\" stroke-width=\"2.0\" /><polygon fill=\"#FFFFFF\" points=\"340.0,349.9178284305241 350.0,319.9178284305241 360.0,349.9178284305241\" stroke=\"#000000\" stroke-width=\"2.0\" /><text dominant-baseline=\"central\" fill=\"#000000\" font-family=\"sans-serif\" font-size=\"16.0\" text-anchor=\"middle\" x=\"350.0\" y=\"387.31782843052406\">The End!\nUse arrow keys\nto navigate.</text></g></g></svg>"];
        const config = {"enableZoom": true, "enablePan": true, "enableHover": true, "enableFullscreen": true, "minZoom": 0.5, "maxZoom": 4.0, "theme": "light", "isBook": true, "pageCount": 3};

        // State
        let currentPage = 0;
        let zoom = 1;
        let panX = 0;
        let panY = 0;
        let isPanning = false;
        let startX = 0;
        let startY = 0;
        let startPanX = 0;
        let startPanY = 0;

        // Elements
        const viewer = document.getElementById('viewer');
        const container = document.getElementById('canvasContainer');
        const canvas = document.getElementById('canvas');
        const svgContainer = document.getElementById('svgContainer');
        const zoomDisplay = document.getElementById('zoomDisplay');
        const zoomLevel = document.getElementById('zoomLevel');

        // Initialize
        function init() {
            loadPage(0);
            updateZoomDisplay();
            centerCanvas();
            setupEventListeners();
            updateThemeIcon();

            if (config.enableHover) {
                svgContainer.classList.add('hover-enabled');
            }

            // Update page count
            const totalPagesEl = document.getElementById('totalPages');
            if (totalPagesEl) {
                totalPagesEl.textContent = config.pageCount;
            }
        }

        function loadPage(index) {
            if (index < 0 || index >= svgPages.length) return;
            currentPage = index;
            svgContainer.innerHTML = svgPages[index];

            // Update page indicator
            const currentPageEl = document.getElementById('currentPage');
            if (currentPageEl) {
                currentPageEl.textContent = index + 1;
            }

            // Update nav buttons
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            if (prevBtn) prevBtn.disabled = index === 0;
            if (nextBtn) nextBtn.disabled = index === svgPages.length - 1;

            // Add data attributes to panels for hover effects
            const panels = svgContainer.querySelectorAll('g');
            panels.forEach((g, i) => {
                if (g.querySelector('rect')) {
                    g.setAttribute('data-panel', i);
                }
            });

            centerCanvas();
        }

        function updateZoomDisplay() {
            const percent = Math.round(zoom * 100) + '%';
            if (zoomDisplay) zoomDisplay.textContent = percent;
            if (zoomLevel) zoomLevel.textContent = percent;
        }

        function setZoom(newZoom, centerX, centerY) {
            if (!config.enableZoom) return;

            const oldZoom = zoom;
            zoom = Math.max(config.minZoom, Math.min(config.maxZoom, newZoom));

            if (centerX !== undefined && centerY !== undefined) {
                // Zoom toward cursor position
                const rect = container.getBoundingClientRect();
                const mouseX = centerX - rect.left;
                const mouseY = centerY - rect.top;

                panX = mouseX - (mouseX - panX) * (zoom / oldZoom);
                panY = mouseY - (mouseY - panY) * (zoom / oldZoom);
            }

            updateTransform();
            updateZoomDisplay();
        }

        function updateTransform() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
        }

        function centerCanvas() {
            const containerRect = container.getBoundingClientRect();
            const svg = svgContainer.querySelector('svg');
            if (!svg) return;

            const svgWidth = parseFloat(svg.getAttribute('width') || svg.viewBox?.baseVal?.width || 800);
            const svgHeight = parseFloat(svg.getAttribute('height') || svg.viewBox?.baseVal?.height || 600);

            // Calculate zoom to fit
            const fitZoom = Math.min(
                (containerRect.width - 40) / svgWidth,
                (containerRect.height - 40) / svgHeight,
                1
            );

            zoom = fitZoom;
            panX = (containerRect.width - svgWidth * zoom) / 2;
            panY = (containerRect.height - svgHeight * zoom) / 2;

            canvas.classList.add('animating');
            updateTransform();
            updateZoomDisplay();

            setTimeout(() => canvas.classList.remove('animating'), 300);
        }

        function setupEventListeners() {
            // Zoom controls
            const zoomInBtn = document.getElementById('zoomIn');
            const zoomOutBtn = document.getElementById('zoomOut');
            const zoomFitBtn = document.getElementById('zoomFit');

            if (zoomInBtn) zoomInBtn.addEventListener('click', () => setZoom(zoom * 1.25));
            if (zoomOutBtn) zoomOutBtn.addEventListener('click', () => setZoom(zoom / 1.25));
            if (zoomFitBtn) zoomFitBtn.addEventListener('click', centerCanvas);

            // Mouse wheel zoom
            if (config.enableZoom) {
                container.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? 0.9 : 1.1;
                    setZoom(zoom * delta, e.clientX, e.clientY);
                }, { passive: false });
            }

            // Pan
            if (config.enablePan) {
                container.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    isPanning = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    startPanX = panX;
                    startPanY = panY;
                    container.style.cursor = 'grabbing';
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isPanning) return;
                    panX = startPanX + (e.clientX - startX);
                    panY = startPanY + (e.clientY - startY);
                    updateTransform();
                });

                document.addEventListener('mouseup', () => {
                    isPanning = false;
                    container.style.cursor = 'grab';
                });
            }

            // Double-click to reset
            container.addEventListener('dblclick', centerCanvas);

            // Theme toggle
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', toggleTheme);
            }

            // Fullscreen
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            if (fullscreenBtn && config.enableFullscreen) {
                fullscreenBtn.addEventListener('click', toggleFullscreen);
            }

            // Page navigation
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            if (prevBtn) prevBtn.addEventListener('click', () => loadPage(currentPage - 1));
            if (nextBtn) nextBtn.addEventListener('click', () => loadPage(currentPage + 1));

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;

                switch (e.key) {
                    case '+':
                    case '=':
                        if (config.enableZoom) setZoom(zoom * 1.25);
                        break;
                    case '-':
                        if (config.enableZoom) setZoom(zoom / 1.25);
                        break;
                    case '0':
                        centerCanvas();
                        break;
                    case 'f':
                    case 'F':
                        if (config.enableFullscreen) toggleFullscreen();
                        break;
                    case 't':
                    case 'T':
                        toggleTheme();
                        break;
                    case 'ArrowLeft':
                        if (config.isBook) loadPage(currentPage - 1);
                        break;
                    case 'ArrowRight':
                        if (config.isBook) loadPage(currentPage + 1);
                        break;
                    case 'Home':
                        if (config.isBook) loadPage(0);
                        break;
                    case 'End':
                        if (config.isBook) loadPage(svgPages.length - 1);
                        break;
                }
            });

            // Window resize
            window.addEventListener('resize', () => {
                centerCanvas();
            });

            // Touch support for mobile
            let touchStartX = 0;
            let touchStartY = 0;
            let touchStartPanX = 0;
            let touchStartPanY = 0;
            let lastTouchDistance = 0;

            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                    touchStartPanX = panX;
                    touchStartPanY = panY;
                } else if (e.touches.length === 2) {
                    lastTouchDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                }
            }, { passive: true });

            container.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1 && config.enablePan) {
                    panX = touchStartPanX + (e.touches[0].clientX - touchStartX);
                    panY = touchStartPanY + (e.touches[0].clientY - touchStartY);
                    updateTransform();
                } else if (e.touches.length === 2 && config.enableZoom) {
                    const distance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    const delta = distance / lastTouchDistance;
                    lastTouchDistance = distance;

                    const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    setZoom(zoom * delta, centerX, centerY);
                }
            }, { passive: true });
        }

        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.contains('theme-dark');
            body.classList.remove('theme-dark', 'theme-light');
            body.classList.add(isDark ? 'theme-light' : 'theme-dark');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            if (icon) {
                const isDark = document.body.classList.contains('theme-dark');
                icon.textContent = isDark ? '🌙' : '☀️';
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                viewer.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        }

        // Start
        init();

    </script>
