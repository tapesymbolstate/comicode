<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Theme Comic</title>
    <meta name="generator" content="Comix - Python Comic Creation Library">
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #e5e5e5;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #d4d4d4;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        .theme-dark {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #404040;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #60a5fa;
            --accent-hover: #93c5fd;
            --border: #404040;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .comic-viewer {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            flex-shrink: 0;
        }

        .toolbar-left, .toolbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .title {
            font-weight: 600;
            font-size: 16px;
        }

        .page-indicator {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            min-width: 36px;
            height: 36px;
        }

        .btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-icon {
            padding: 6px;
        }

        .btn-group {
            display: flex;
            gap: 4px;
        }

        .zoom-display {
            min-width: 60px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .canvas-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: var(--bg-tertiary);
            cursor: grab;
        }

        .canvas-container:active {
            cursor: grabbing;
        }

        .canvas {
            position: absolute;
            transform-origin: 0 0;
            transition: none;
        }

        .canvas.animating {
            transition: transform 0.3s ease-out;
        }

        .svg-container {
            background: white;
            box-shadow: 0 4px 20px var(--shadow);
            border-radius: 4px;
            overflow: hidden;
        }

        .svg-container svg {
            display: block;
        }

        /* Hover effects for panels */
        .svg-container.hover-enabled svg g[data-panel] {
            transition: filter 0.2s ease, transform 0.2s ease;
            transform-origin: center;
        }

        .svg-container.hover-enabled svg g[data-panel]:hover {
            filter: brightness(1.02);
            cursor: pointer;
        }

        .navigation {
            position: fixed;
            bottom: 50%;
            transform: translateY(50%);
            z-index: 50;
        }

        .navigation.prev {
            left: 16px;
        }

        .navigation.next {
            right: 16px;
        }

        .nav-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.15s ease;
        }

        .nav-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-btn:disabled:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
            border-color: var(--border);
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 16px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .separator {
            color: var(--border);
        }

        /* Fullscreen mode */
        .comic-viewer:fullscreen {
            background: var(--bg-secondary);
        }

        .comic-viewer:fullscreen .toolbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .comic-viewer:fullscreen:hover .toolbar {
            opacity: 1;
        }

        .comic-viewer:fullscreen .status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .comic-viewer:fullscreen:hover .status-bar {
            opacity: 1;
        }

        /* Hide elements based on config */
        .hidden {
            display: none !important;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .toolbar {
                padding: 8px 12px;
            }

            .toolbar-left, .toolbar-right {
                gap: 8px;
            }

            .title {
                font-size: 14px;
            }

            .btn {
                min-width: 32px;
                height: 32px;
                padding: 4px 8px;
            }

            .nav-btn {
                width: 40px;
                height: 40px;
            }

            .navigation.prev {
                left: 8px;
            }

            .navigation.next {
                right: 8px;
            }
        }

    </style>
</head>
<body class="theme-dark">
    <div class="comic-viewer" id="viewer">
        <header class="toolbar">
            <div class="toolbar-left">
                <span class="title">Dark Theme Comic</span>
                
            </div>
            <div class="toolbar-right">
                
                <div class="btn-group zoom-controls">
                    <button class="btn btn-icon" id="zoomOut" title="Zoom out (-)">−</button>
                    <span class="btn zoom-display" id="zoomDisplay">100%</span>
                    <button class="btn btn-icon" id="zoomIn" title="Zoom in (+)">+</button>
                    <button class="btn" id="zoomFit" title="Fit to screen (0)">Fit</button>
                </div>
                
                <button class="btn btn-icon" id="themeToggle" title="Toggle theme (T)">
                    <span id="themeIcon">☀️</span>
                </button>
                
                <button class="btn btn-icon" id="fullscreenBtn" title="Fullscreen (F)">⛶</button>
            </div>
        </header>

        <main class="canvas-container" id="canvasContainer">
            <div class="canvas" id="canvas">
                <div class="svg-container" id="svgContainer">
                    <!-- SVG will be inserted here -->
                </div>
            </div>
        </main>

        

        <footer class="status-bar">
            <span id="zoomLevel">100%</span>
            <span class="separator">|</span>
            <span id="instructions">Scroll to zoom • Drag to pan • Double-click to reset</span>
        </footer>
    </div>

    <script>
        const svgPages = ["<svg baseProfile=\"full\" height=\"600px\" version=\"1.1\" width=\"600px\" xmlns=\"http://www.w3.org/2000/svg\" xmlns:ev=\"http://www.w3.org/2001/xml-events\" xmlns:xlink=\"http://www.w3.org/1999/xlink\"><defs /><rect fill=\"#FFFFFF\" height=\"600\" width=\"600\" x=\"0\" y=\"0\" /><g opacity=\"1.0\"><rect fill=\"#FFFFFF\" height=\"550\" stroke=\"#000000\" stroke-width=\"2.0\" width=\"550\" x=\"25.0\" y=\"25.0\" /><g opacity=\"1.0\"><polygon fill=\"none\" points=\"288.3,263.3 287.1501545866466,268.70959735290813 283.8994370645728,273.18382617884936 279.1099260251868,275.94905166672555 273.60977143854024,276.527141208398 268.35,274.81813787033303 264.2400739748132,271.1175438554899 261.99063691024037,266.0652254878762 261.99063691024037,260.5347745121238 264.2400739748132,255.4824561445101 268.34999999999997,251.78186212966696 273.6097714385402,250.07285879160196 279.1099260251868,250.65094833327447 283.8994370645728,253.41617382115066 287.1501545866466,257.89040264709183 288.3,263.3\" stroke=\"#9C27B0\" stroke-width=\"2.0\" /><circle cx=\"270.58125\" cy=\"261.05\" fill=\"#9C27B0\" r=\"1.7999999999999998\" /><circle cx=\"281.08125\" cy=\"261.05\" fill=\"#9C27B0\" r=\"1.7999999999999998\" /><line stroke=\"#9C27B0\" stroke-width=\"2\" x1=\"270.58125\" x2=\"281.08125\" y1=\"268.55\" y2=\"268.55\" /><line stroke=\"#9C27B0\" stroke-width=\"2.0\" x1=\"275.0\" x2=\"275.0\" y1=\"276.6\" y2=\"316.6\" /><line stroke=\"#9C27B0\" stroke-width=\"2.0\" x1=\"275.0\" x2=\"256.6474093005077\" y1=\"280.6\" y2=\"275.6824381430521\" /><line stroke=\"#9C27B0\" stroke-width=\"2.0\" x1=\"256.6474093005077\" x2=\"238.2948186010154\" y1=\"275.6824381430521\" y2=\"270.7648762861042\" /><line stroke=\"#9C27B0\" stroke-width=\"2.0\" x1=\"275.0\" x2=\"293.3525906994923\" y1=\"280.6\" y2=\"285.5175618569479\" /><line stroke=\"#9C27B0\" stroke-width=\"2.0\" x1=\"293.3525906994923\" x2=\"311.70518139898456\" y1=\"285.5175618569479\" y2=\"290.4351237138958\" /><line stroke=\"#9C27B0\" stroke-width=\"2.0\" x1=\"275.0\" x2=\"275.0\" y1=\"316.6\" y2=\"343.1\" /><line stroke=\"#9C27B0\" stroke-width=\"2.0\" x1=\"275.0\" x2=\"275.0\" y1=\"343.1\" y2=\"369.6\" /><line stroke=\"#9C27B0\" stroke-width=\"2.0\" x1=\"275.0\" x2=\"275.0\" y1=\"316.6\" y2=\"343.1\" /><line stroke=\"#9C27B0\" stroke-width=\"2.0\" x1=\"275.0\" x2=\"275.0\" y1=\"343.1\" y2=\"369.6\" /></g><g opacity=\"1.0\"><polygon fill=\"#FFFFFF\" points=\"198.2948186010154,272.43642939580104 202.74523728014168,272.9378711521646 206.97249338336655,274.4170520377526 210.7646146381901,276.79979974644044 213.931448250376,279.9666333586264 216.3141959590638,283.75875461344987 217.79337684465187,287.98601071667474 218.2948186010154,292.43642939580104 218.2948186010154,327.236429395801 217.79337684465187,331.6868480749273 216.3141959590638,335.9141041781522 213.931448250376,339.70622543297566 210.7646146381901,342.8730590451616 206.97249338336655,345.2558067538494 202.74523728014168,346.73498763943746 198.2948186010154,347.236429395801 -1.7051813989845925,347.236429395801 -6.155600078110879,346.73498763943746 -10.382856181335754,345.2558067538494 -14.174977436159267,342.8730590451616 -17.341811048345193,339.7062254329757 -19.72455875703298,335.9141041781522 -21.20373964262106,331.6868480749273 -21.705181398984593,327.236429395801 -21.705181398984593,292.43642939580104 -21.20373964262106,287.98601071667474 -19.72455875703298,283.75875461344987 -17.341811048345193,279.9666333586264 -14.174977436159267,276.79979974644044 -10.382856181335754,274.4170520377526 -6.155600078110879,272.9378711521646 -1.7051813989845925,272.43642939580104 198.2948186010154,272.43642939580104\" stroke=\"#000000\" stroke-width=\"2.0\" /><polygon fill=\"#FFFFFF\" points=\"218.2948186010154,304.1281426983932 268.29481860101544,309.836429395801 218.2948186010154,315.5447160932088\" stroke=\"#000000\" stroke-width=\"2.0\" /><text dominant-baseline=\"central\" fill=\"#000000\" font-family=\"sans-serif\" font-size=\"16.0\" text-anchor=\"middle\" x=\"98.29481860101541\" y=\"309.836429395801\">Dark theme looks\ngreat at night!</text></g></g></svg>"];
        const config = {"enableZoom": true, "enablePan": true, "enableHover": true, "enableFullscreen": true, "minZoom": 0.5, "maxZoom": 4.0, "theme": "dark", "isBook": false, "pageCount": 1};

        // State
        let currentPage = 0;
        let zoom = 1;
        let panX = 0;
        let panY = 0;
        let isPanning = false;
        let startX = 0;
        let startY = 0;
        let startPanX = 0;
        let startPanY = 0;

        // Elements
        const viewer = document.getElementById('viewer');
        const container = document.getElementById('canvasContainer');
        const canvas = document.getElementById('canvas');
        const svgContainer = document.getElementById('svgContainer');
        const zoomDisplay = document.getElementById('zoomDisplay');
        const zoomLevel = document.getElementById('zoomLevel');

        // Initialize
        function init() {
            loadPage(0);
            updateZoomDisplay();
            centerCanvas();
            setupEventListeners();
            updateThemeIcon();

            if (config.enableHover) {
                svgContainer.classList.add('hover-enabled');
            }

            // Update page count
            const totalPagesEl = document.getElementById('totalPages');
            if (totalPagesEl) {
                totalPagesEl.textContent = config.pageCount;
            }
        }

        function loadPage(index) {
            if (index < 0 || index >= svgPages.length) return;
            currentPage = index;
            svgContainer.innerHTML = svgPages[index];

            // Update page indicator
            const currentPageEl = document.getElementById('currentPage');
            if (currentPageEl) {
                currentPageEl.textContent = index + 1;
            }

            // Update nav buttons
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            if (prevBtn) prevBtn.disabled = index === 0;
            if (nextBtn) nextBtn.disabled = index === svgPages.length - 1;

            // Add data attributes to panels for hover effects
            const panels = svgContainer.querySelectorAll('g');
            panels.forEach((g, i) => {
                if (g.querySelector('rect')) {
                    g.setAttribute('data-panel', i);
                }
            });

            centerCanvas();
        }

        function updateZoomDisplay() {
            const percent = Math.round(zoom * 100) + '%';
            if (zoomDisplay) zoomDisplay.textContent = percent;
            if (zoomLevel) zoomLevel.textContent = percent;
        }

        function setZoom(newZoom, centerX, centerY) {
            if (!config.enableZoom) return;

            const oldZoom = zoom;
            zoom = Math.max(config.minZoom, Math.min(config.maxZoom, newZoom));

            if (centerX !== undefined && centerY !== undefined) {
                // Zoom toward cursor position
                const rect = container.getBoundingClientRect();
                const mouseX = centerX - rect.left;
                const mouseY = centerY - rect.top;

                panX = mouseX - (mouseX - panX) * (zoom / oldZoom);
                panY = mouseY - (mouseY - panY) * (zoom / oldZoom);
            }

            updateTransform();
            updateZoomDisplay();
        }

        function updateTransform() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
        }

        function centerCanvas() {
            const containerRect = container.getBoundingClientRect();
            const svg = svgContainer.querySelector('svg');
            if (!svg) return;

            const svgWidth = parseFloat(svg.getAttribute('width') || svg.viewBox?.baseVal?.width || 800);
            const svgHeight = parseFloat(svg.getAttribute('height') || svg.viewBox?.baseVal?.height || 600);

            // Calculate zoom to fit
            const fitZoom = Math.min(
                (containerRect.width - 40) / svgWidth,
                (containerRect.height - 40) / svgHeight,
                1
            );

            zoom = fitZoom;
            panX = (containerRect.width - svgWidth * zoom) / 2;
            panY = (containerRect.height - svgHeight * zoom) / 2;

            canvas.classList.add('animating');
            updateTransform();
            updateZoomDisplay();

            setTimeout(() => canvas.classList.remove('animating'), 300);
        }

        function setupEventListeners() {
            // Zoom controls
            const zoomInBtn = document.getElementById('zoomIn');
            const zoomOutBtn = document.getElementById('zoomOut');
            const zoomFitBtn = document.getElementById('zoomFit');

            if (zoomInBtn) zoomInBtn.addEventListener('click', () => setZoom(zoom * 1.25));
            if (zoomOutBtn) zoomOutBtn.addEventListener('click', () => setZoom(zoom / 1.25));
            if (zoomFitBtn) zoomFitBtn.addEventListener('click', centerCanvas);

            // Mouse wheel zoom
            if (config.enableZoom) {
                container.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const delta = e.deltaY > 0 ? 0.9 : 1.1;
                    setZoom(zoom * delta, e.clientX, e.clientY);
                }, { passive: false });
            }

            // Pan
            if (config.enablePan) {
                container.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    isPanning = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    startPanX = panX;
                    startPanY = panY;
                    container.style.cursor = 'grabbing';
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isPanning) return;
                    panX = startPanX + (e.clientX - startX);
                    panY = startPanY + (e.clientY - startY);
                    updateTransform();
                });

                document.addEventListener('mouseup', () => {
                    isPanning = false;
                    container.style.cursor = 'grab';
                });
            }

            // Double-click to reset
            container.addEventListener('dblclick', centerCanvas);

            // Theme toggle
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', toggleTheme);
            }

            // Fullscreen
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            if (fullscreenBtn && config.enableFullscreen) {
                fullscreenBtn.addEventListener('click', toggleFullscreen);
            }

            // Page navigation
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            if (prevBtn) prevBtn.addEventListener('click', () => loadPage(currentPage - 1));
            if (nextBtn) nextBtn.addEventListener('click', () => loadPage(currentPage + 1));

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;

                switch (e.key) {
                    case '+':
                    case '=':
                        if (config.enableZoom) setZoom(zoom * 1.25);
                        break;
                    case '-':
                        if (config.enableZoom) setZoom(zoom / 1.25);
                        break;
                    case '0':
                        centerCanvas();
                        break;
                    case 'f':
                    case 'F':
                        if (config.enableFullscreen) toggleFullscreen();
                        break;
                    case 't':
                    case 'T':
                        toggleTheme();
                        break;
                    case 'ArrowLeft':
                        if (config.isBook) loadPage(currentPage - 1);
                        break;
                    case 'ArrowRight':
                        if (config.isBook) loadPage(currentPage + 1);
                        break;
                    case 'Home':
                        if (config.isBook) loadPage(0);
                        break;
                    case 'End':
                        if (config.isBook) loadPage(svgPages.length - 1);
                        break;
                }
            });

            // Window resize
            window.addEventListener('resize', () => {
                centerCanvas();
            });

            // Touch support for mobile
            let touchStartX = 0;
            let touchStartY = 0;
            let touchStartPanX = 0;
            let touchStartPanY = 0;
            let lastTouchDistance = 0;

            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                    touchStartPanX = panX;
                    touchStartPanY = panY;
                } else if (e.touches.length === 2) {
                    lastTouchDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                }
            }, { passive: true });

            container.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1 && config.enablePan) {
                    panX = touchStartPanX + (e.touches[0].clientX - touchStartX);
                    panY = touchStartPanY + (e.touches[0].clientY - touchStartY);
                    updateTransform();
                } else if (e.touches.length === 2 && config.enableZoom) {
                    const distance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    const delta = distance / lastTouchDistance;
                    lastTouchDistance = distance;

                    const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    setZoom(zoom * delta, centerX, centerY);
                }
            }, { passive: true });
        }

        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.contains('theme-dark');
            body.classList.remove('theme-dark', 'theme-light');
            body.classList.add(isDark ? 'theme-light' : 'theme-dark');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeIcon');
            if (icon) {
                const isDark = document.body.classList.contains('theme-dark');
                icon.textContent = isDark ? '🌙' : '☀️';
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                viewer.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        }

        // Start
        init();

    </script>
</body>
